<div class="page-container">
  <div class="max-w-2xl">
    <p-card>
      <ng-template pTemplate="header">
        <div class="page-header-card">
          <h1>{{ editing ? 'Editar Livro' : 'Novo Livro' }}</h1>
          <p>{{ editing ? 'Atualize os dados do livro' : 'Adicione um novo livro à sua biblioteca' }}</p>
        </div>
      </ng-template>

      <form (ngSubmit)="onSubmit()" class="form-container">
        <div class="form-group">
          <label for="titulo">Título *</label>
          <input 
            pInputText 
            id="titulo"
            name="titulo" 
            type="text" 
            [(ngModel)]="titulo" 
            required 
            class="w-full"
            placeholder="Digite o título do livro"
          />
        </div>

        <div class="form-group">
          <label for="autor">Autor *</label>
          <input 
            pInputText 
            id="autor"
            name="autor" 
            type="text" 
            [(ngModel)]="autor" 
            required 
            class="w-full"
            placeholder="Digite o nome do autor"
          />
        </div>

        <div class="form-group">
          <label for="arquivo">Arquivo PDF (opcional)</label>
          <input 
            type="file" 
            id="arquivo"
            (change)="onFileChange($event)" 
            accept="application/pdf"
            class="w-full"
          />
          <small *ngIf="arquivo" class="file-name">📎 {{ arquivo.name }}</small>
        </div>

        <p-message *ngIf="message" severity="success" [text]="message" styleClass="w-full mb-4"></p-message>
        <p-message *ngIf="error" severity="error" [text]="error" styleClass="w-full mb-4"></p-message>

        <div class="actions-container">
          <a routerLink="/livros" pButton type="button" label="Cancelar" class="p-button-secondary"></a>
          <button 
            pButton 
            type="submit" 
            [label]="editing ? 'Salvar' : 'Criar'" 
            class="p-button-primary"
            [disabled]="loading"
            [loading]="loading"
          ></button>
        </div>
      </form>
    </p-card>
  </div>
</div>
