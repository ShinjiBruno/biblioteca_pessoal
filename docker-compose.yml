version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: biblioteca-mysql
    restart: always
    environment:
      MYSQL_DATABASE: biblioteca
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3307"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - ./infra/mysql/data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Identity Management
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: biblioteca-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: dev-file 
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/data:/opt/keycloak/data
      - ./infra/keycloak/realm-biblioteca.json:/opt/keycloak/data/import/realm-biblioteca.json:ro

  # Object Storage
  minio:
    image: minio/minio
    container_name: biblioteca-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console Web
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - ./storage/minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: biblioteca-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 admin password; do
        echo 'Aguardando MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/livros;
      echo 'Bucket livros pronto.';
      "

  backend:
    build: ./backend
    container_name: biblioteca-api
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "mysql+aiomysql://user:password@mysql:3306/biblioteca"
    expose:
      - "8000"

  # API Gateway
  krakend:
    image: devopsfaith/krakend:latest
    container_name: biblioteca-gateway
    volumes:
      - ./gateway/krakend.json:/etc/krakend/krakend.json
    ports:
      - "8081:8080" 
    depends_on:
      - backend

  # Frontend Angular
